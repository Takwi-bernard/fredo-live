<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Fredo Live Hub</title>
</head>

<body>

<div class="app" style="display: block;"> <!-- Changed layout flow from flex side-by-side to stacked profile -->

    <!-- MODERN TOP APP NAVIGATION NAVIGATION DOCK -->
    <header class="sidebar" style="width: 100%; height: auto; flex-direction: row; align-items: center; justify-content: space-between; border-right: none; border-bottom: 1px solid #1e293b;">
        <h2 class="logo" style="margin-bottom: 0;">Fredo Live</h2>

        <div class="nav" style="display: flex; gap: 10px; margin-bottom: 0;">
            <button type="submit" onclick="goLive()">🎥 Go Live</button>
            <button onclick="watchLive()">📺 Explore</button>
            <button onclick="logout()">🚪 Logout</button>
        </div>

        <div class="user-box" style="padding-top: 0; border-top: none;">
            <p id="userEmail">Loading...</p>
        </div>
    </header>

    <!-- CONTENT DISPLAY WORKSPACE -->
    <div class="main">
        <div class="topbar">
            <h3>Live Streams</h3>
            <p>Discover what’s happening now</p>
        </div>

        <!-- RESTRUCTURED DISCOVER TILES -->
        <div class="grid">
            <div class="card-stream">
                <div class="thumbnail"></div>
                <h4>No active streams yet</h4>
                <p>Be the first to go live</p>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="../js/dashboard.js"></script>

</body>
</html>
