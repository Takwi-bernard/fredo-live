<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Fredo Live - Setup Broadcast</title>
</head>

<body>

<div class="container">
    <div class="card">
        <h2>🎥 Setup Live Stream</h2>
        
        <input id="title" placeholder="Stream title">
        <textarea id="description" placeholder="Description" style="width:100%; min-height:80px; padding:12px; border-radius:8px; margin-top:10px; background:#111726; color:white; border:1px solid #334155; font-family:inherit;"></textarea>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
            <select id="category" style="padding:12px; border-radius:8px; background:#111726; color:white; border:1px solid #334155;">
                <option>Coding</option>
                <option>Education</option>
                <option>Gaming</option>
                <option>Music</option>
                <option>General</option>
            </select>

            <select id="privacy" style="padding:12px; border-radius:8px; background:#111726; color:white; border:1px solid #334155;">
                <option value="public">Public</option>
                <option value="private">Private</option>
            </select>
        </div>

        <input id="duration" placeholder="Expected duration">

        <button class="btn" onclick="createStream()">Create Stream</button>
    </div>
</div>

<script type="module" src="../js/live.js"></script>

</body>
</html>
