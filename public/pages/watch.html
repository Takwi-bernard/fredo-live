<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Stream - Fredo Live</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="watch-page">

    <header class="watch-header">
        <div>
            <h2>Fredo Live</h2>
            <p id="streamStatus">🔴 LIVE</p>
        </div>
        <div>
            <p id="viewerCount">👥 0 Watching</p>
        </div>
    </header>

    <div class="watch-layout">

        <!-- Left Media Core Deck -->
        <div class="video-area">
            <div class="video-wrapper">
                <video id="remoteVideo" autoplay playsinline controls></video>
            </div>

            <div class="stream-details">
                <h2 id="streamTitle" style="margin-top:10px;"></h2>
                <p id="streamCategory"></p>
                <p id="hostName" style="font-weight:bold; color:#00f2fe;"></p>
            </div>

            <!-- Standardized Single System Control Bar Tray -->
            <div class="watch-actions">
                <button onclick="toggleMic()">🎤 Mic</button>
                <button onclick="copyStreamLink()">📋 Share</button>
                <button onclick="toggleFullscreen()">⛶ Fullscreen</button>
                <button onclick="leaveStream()" style="background:#ef4444; color:white;">Leave</button>
            </div>
        </div>

        <!-- Right Side Live Engagement Chat Block -->
        <div class="chat-panel">
            <h3>💬 Live Chat</h3>
            <div id="messages"></div>

            <div class="chat-input">
                <input id="chatMessage" placeholder="Type a message">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>

    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script type="module" src="../js/watch.js"></script>

</body>
</html>
